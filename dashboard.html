<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | GoldReserve</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html" style="text-decoration: none; color: inherit;">GOLDRESERVE</a></div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="booking.html">Book Gold</a></li>
        </ul>
        <div id="user-info">
            <span id="user-name"></span>
            <button onclick="logout()" class="btn btn-outline">Logout</button>
        </div>
    </nav>

    <div class="container">
        <h1>My Dashboard</h1>
        
        <div class="card" style="margin-top: 2rem;">
            <h2>Recent Bookings</h2>
            <div id="bookings-list">
                <p>Loading your bookings...</p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        const loadDashboard = async () => {
            try {
                const bookings = await apiRequest('/bookings/user-bookings');
                const listDiv = document.getElementById('bookings-list');
                
                if (bookings.length === 0) {
                    listDiv.innerHTML = '<p>No bookings found. Start investing today!</p>';
                    return;
                }

                let html = '<table><thead><tr><th>Date</th><th>Weight (g)</th><th>Price/g</th><th>Total</th><th>Status</th></tr></thead><tbody>';
                bookings.forEach(b => {
                    html += `
                        <tr>
                            <td>${new Date(b.bookingDate).toLocaleDateString()}</td>
                            <td>${b.weight}g</td>
                            <td>₹${b.priceAtBooking.toLocaleString()}</td>
                            <td>₹${(b.weight * b.priceAtBooking).toLocaleString()}</td>
                            <td><span class="status-${b.status}">${b.status.toUpperCase()}</span></td>
                        </tr>
                    `;
                });
                html += '</tbody></table>';
                listDiv.innerHTML = html;
            } catch (err) {
                document.getElementById('bookings-list').innerHTML = '<p>Error loading bookings. Please login again.</p>';
            }
        };
        
        document.addEventListener('DOMContentLoaded', loadDashboard);
    </script>
</body>
</html>
