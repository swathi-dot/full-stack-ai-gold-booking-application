<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldReserve | Premium Gold Booking</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <nav>
        <div class="logo">GOLDRESERVE</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="booking.html" id="booking-link">Book Gold</a></li>
            <li><a href="dashboard.html" id="dashboard-link">Dashboard</a></li>
            <li><a href="admin.html" id="admin-link" style="display: none;">Admin</a></li>
        </ul>
        <div id="auth-buttons">
            <a href="login.html" class="btn btn-outline">Login</a>
            <a href="register.html" class="btn btn-primary">Join Now</a>
        </div>
        <div id="user-info" style="display: none;">
            <span id="user-name"></span>
            <button onclick="logout()" class="btn btn-outline">Logout</button>
        </div>
    </nav>

    <section class="hero">
        <h1>Invest in Pure Gold</h1>
        <p>Secure your future with the most trusted gold booking platform. Powered by AI trends.</p>
    </section>

    <div class="container" style="text-align: center;">
        <div class="price-card">
            <h3>Live Gold Price (per gram)</h3>
            <div class="current-price">₹<span id="live-price">6,500</span></div>
            <p>Last updated: <span id="last-updated">Just now</span></p>
            <a href="booking.html" class="btn btn-primary" style="margin-top: 1rem; display: inline-block;">Start Booking</a>
        </div>

        <div class="chart-container">
            <h2>Market Trends & AI Prediction</h2>
            <canvas id="goldChart"></canvas>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/home.js"></script>
</body>
</html>
